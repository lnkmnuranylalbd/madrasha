<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ফলাফল - নেছারিয়া কামিল মাদ্রাসা নুরানী শাখা</title>
<style>
body {font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5;}
.header {background: #2c5aa0; color: white; padding: 15px; text-align: center; border-radius: 8px;}
.btn-box {max-width: 500px; margin: 30px auto; display: flex; flex-direction: column; gap: 15px;}
.btn {background: #4CAF50; color: white; padding: 20px; text-align: center; font-size: 20px; 
      border-radius: 8px; text-decoration: none; transition: 0.3s; border: none; cursor: pointer; width: 100%;}
.btn:hover {background: #45a049;}
.back {background: #888; font-size: 18px; padding: 15px;}
.form-box {background: white; padding: 20px; border-radius: 8px; margin-top: 15px; display: none;}
label {display: block; text-align: left; margin: 12px 0 5px 0; font-weight: bold;}
select {width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box;}
.show-result {background: #16a34a; color: white; margin-top: 15px; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%;}
.result-box {background: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; text-align: left;}
</style>
</head>
<body>
<div class="header">
    <h1>ফলাফল</h1>
</div>

<div class="btn-box">
    <button class="btn" onclick="showForm('শিশু শ্রেণী')">📝 শিশু শ্রেণী</button>
    <button class="btn" onclick="showForm('প্রথম শ্রেণি')">📝 প্রথম শ্রেণি</button>
    <button class="btn" onclick="showForm('দ্বিতীয় শ্রেণী')">📝 দ্বিতীয় শ্রেণী</button>
    <button class="btn" onclick="showForm('তৃতীয় শ্রেণি')">📝 তৃতীয় শ্রেণি</button>
    <a href="index.html" class="btn back">← হোমে ফেরত</a>

    <div class="form-box" id="formBox">
        <label>পরীক্ষার নাম:</label>
        <select id="exam">
            <option value="">-- সিলেক্ট করুন --</option>
            <option>মাসিক</option>
            <option>প্রথম সাময়িক</option>
            <option>দ্বিতীয় সাময়িক</option>
            <option>বার্ষিক</option>
        </select>

        <label>রোল নম্বর:</label>
        <select id="roll"></select>

        <label>সাল:</label>
        <select id="year">
            <option value="">-- সিলেক্ট করুন --</option>
            <option>2026</option>
            <option>2025</option>
            <option>2024</option>
        </select>

        <button class="show-result" onclick="showResult()">ফলাফল দেখুন</button>
        <div class="result-box" id="resultBox"></div>
    </div>
</div>

<script>
let currentClass = '';

// রোল 001 থেকে 150 পর্যন্ত অটো লোড
const rollSelect = document.getElementById('roll');
for(let i=1; i<=150; i++){
    let val = i.toString().padStart(3, '0');
    let opt = document.createElement('option');
    opt.value = val;
    opt.text = val;
    rollSelect.add(opt);
}

function showForm(className){
    currentClass = className;
    document.getElementById('formBox').style.display = 'block';
    document.getElementById('resultBox').style.display = 'none';
}

function showResult(){
    const exam = document.getElementById('exam').value;
    const roll = document.getElementById('roll').value;
    const year = document.getElementById('year').value;
    const resultBox = document.getElementById('resultBox');

    if(!exam || !roll || !year){
        alert('দয়া করে সব সিলেক্ট করুন');
        return;
    }

    resultBox.style.display = 'block';
    resultBox.innerHTML = `
        <h3 style="text-align:center; margin-top:0;">${year} - ${exam}</h3>
        <p><strong>শ্রেণী:</strong> ${currentClass}</p>
        <p><strong>রোল:</strong> ${roll}</p>
        <p>এখানে আসল রেজাল্টের ডাটা বসবে। এখন ডেমো দেখাচ্ছে।</p>
    `;
}
</script>
</body>
</html>
