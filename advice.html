<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাঠ পরামর্শ - নেছারিয়া কামিল মাদ্রাসা</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f0f8ff; }
        h1 { background: #2c5aa0; color: white; padding: 20px; border-radius: 10px; }
        .btn { 
            display: block; 
            width: 80%; 
            max-width: 500px;
            margin: 15px auto; 
            padding: 18px; 
            background: #4CAF50; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-size: 18px;
            cursor: pointer;
            border: none;
        }
        .btn:hover { background: #45a049; }
        .back { background: #888; }
        
        .dropdown-content, .sub-dropdown-content {
            display: none;
            width: 80%;
            max-width: 500px;
            margin: 0 auto 15px auto;
            background: #e8f5e9;
            border-radius: 8px;
            overflow: hidden;
        }
        .dropdown-content.show, .sub-dropdown-content.show { display: block; }
        
        .dropdown-content a, .sub-dropdown-btn {
            display: block;
            padding: 12px;
            color: #006400;
            text-decoration: none;
            font-size: 16px;
            background: none;
            border: none;
            width: 100%;
            text-align: center;
            cursor: pointer;
        }
        .dropdown-content a:hover, .sub-dropdown-btn:hover { background: #c8e6c9; }
        .sub-dropdown-content { background: #dcedc8; }
    </style>
</head>
<body>
    <h1>পাঠ পরামর্শ</h1>
    
    <div class="dropdown">
        <button onclick="toggleDropdown('pathDropdown')" class="btn">শ্রেণী নির্বাচন করুন ▼</button>
        <div id="pathDropdown" class="dropdown-content">
            
            <button onclick="toggleDropdown('shishuDropdown')" class="sub-dropdown-btn">👶 শিশু শ্রেণী</button>
            <div id="shishuDropdown" class="sub-dropdown-content">
                <a href="shishu-bangla.html">বাংলা</a>
                <a href="shishu-english.html">ইংরেজি</a>
                <a href="shishu-math.html">গণিত</a>
                <a href="shishu-arabi.html">আরবি লেখা</a>
                <a href="shishu-kalima.html">কালিমা ও মাসায়েল</a>
                <a href="shishu-hadis.html">হাদীস শরীফ</a>
            </div>

            <button onclick="toggleDropdown('class1Dropdown')" class="sub-dropdown-btn">🧒 প্রথম শ্রেণী</button>
            <div id="class1Dropdown" class="sub-dropdown-content">
                <a href="class1-bangla.html">বাংলা</a>
                <a href="class1-english.html">ইংরেজি</a>
                <a href="class1-math.html">গণিত</a>
            </div>

            <button onclick="toggleDropdown('class2Dropdown')" class="sub-dropdown-btn">🧒 দ্বিতীয় শ্রেণী</button>
            <div id="class2Dropdown" class="sub-dropdown-content">
                <a href="class2-bangla.html">বাংলা</a>
                <a href="class2-english.html">ইংরেজি</a>
            </div>

            <button onclick="toggleDropdown('class3Dropdown')" class="sub-dropdown-btn">🧒 তৃতীয় শ্রেণী</button>
            <div id="class3Dropdown" class="sub-dropdown-content">
                <a href="class3-bangla.html">বাংলা</a>
                <a href="class3-english.html">ইংরেজি</a>
            </div>
        </div>
    </div>
    
    <a href="menu.html" class="btn back">← হোমে ফেরত</a>

    <script>
        function toggleDropdown(id) {
            document.getElementById(id).classList.toggle("show");
        }
    </script>
</body>
</html>
