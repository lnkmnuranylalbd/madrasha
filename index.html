<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>লালমনিরহাট নেছারিয়া কামিল মাদ্রাসা নুরানী শাখা</title>
<style>
body {font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f8ff;}
/* হেডার */
.topbar {
    background: #2c5aa0;
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.topbar h1 {
    font-size: 18px;
    margin: 0;
    text-align: center;
    flex: 1;
}
/* হ্যামবার্গার বাটন */
.menu-btn {
    font-size: 28px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}
/* সাইড মেনু */
.sidemenu {
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    left: 0;
    background-color: #fff;
    overflow-x: hidden;
    transition: 0.3s;
    box-shadow: 2px 0 5px rgba(0,0,0,0.3);
    z-index: 1000;
}
.sidemenu a {
    padding: 15px 20px;
    text-decoration: none;
    font-size: 18px;
    color: #333;
    display: block;
    border-bottom: 1px solid #eee;
}
.sidemenu a:hover {
    background: #e0f0ff;
}
.sidemenu .closebtn {
    font-size: 30px;
    text-align: right;
    padding: 10px 20px;
    border-bottom: none;
}
/* মূল কনটেন্ট */
.content {
    padding: 30px 20px;
    text-align: center;
}
.content h2 {
    color: #2c5aa0;
    margin-bottom: 20px;
}
</style>
</head>
<body>

<!-- উপরের হেডার -->
<div class="topbar">
    <button class="menu-btn" onclick="openMenu()">☰</button>
    <h1>নেছারিয়া কামিল মাদ্রাসা</h1>
</div>

<!-- সাইড মেনু -->
<div id="mySidemenu" class="sidemenu">
    <a href="javascript:void(0)" class="closebtn" onclick="closeMenu()">×</a>
    <a href="lesson.html">📖 পাঠ পরামর্শ</a>
    <a href="syllabus.html">📚 সিলেবাস</a>
    <a href="routine.html">📅 রুটিন</a>
    <a href="exam.html">📝 ফলাফল</a>
    <a href="admission.html">🎓 ভর্তি</a>
    <a href="info.html">ℹ️ তথ্য</a>
</div>

<!-- মূল কনটেন্ট -->
<div class="content">
    <h2>স্বাগতম</h2>
    <p>উপরে বাম পাশের ☰ মেনু চাপলে সব অপশন পাবেন।</p>
</div>

<script>
function openMenu() {
    document.getElementById("mySidemenu").style.width = "250px";
}
function closeMenu() {
    document.getElementById("mySidemenu").style.width = "0";
}
</script>

</body>
</html>
