<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>রুটিন - লালমনিরহাট নেছারিয়া কামিল মাদ্রাসা</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    text-align: center;
}
.header {
    background: #2c5aa0;
    color: white;
    padding: 15px;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 30px;
}
.btn {
    background: #4CAF50;
    color: white;
    padding: 25px;
    text-align: center;
    font-size: 22px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
    width: 90%;
    max-width: 500px;
    margin: 15px auto;
    display: block;
    border: none;
    cursor: pointer;
}
.btn:hover {
    background: #45a049;
}
.back {
    background: #888;
    font-size: 18px;
    padding: 15px;
}
.dropdown-content {
    display: none;
    background-color: #e8f5e9;
    border-radius: 8px;
    padding: 10px;
    width: 85%;
    max-width: 480px;
    margin: 5px auto 20px auto;
}
.dropdown-content a {
    color: #2c5aa0;
    padding: 14px 16px;
    text-decoration: none;
    display: block;
    font-size: 18px;
    border-bottom: 1px solid #c8e6c9;
    font-weight: bold;
}
.dropdown-content a:last-child {
    border-bottom: none;
}
.dropdown-content a:hover {
    background-color: #c8e6c9;
}
.show {
    display: block;
}
.download-link {
    font-size: 14px!important;
    color: #4CAF50!important;
    border-bottom: none!important;
    padding: 5px 16px 14px 16px!important;
}
.day-block {
    margin-bottom: 10px;
    border-bottom: 1px solid #c8e6c9;
}
.day-block:last-child {
    border-bottom: none;
}
</style>
</head>
<body>

<div class="header">
    <h1>রুটিন</h1>
</div>

<button onclick="toggleDropdown('examRoutine')" class="btn">📅 পরীক্ষার রুটিন</button>
<div id="examRoutine" class="dropdown-content">
    <a href="routine-exam.pdf" target="_blank">📄 পরীক্ষার রুটিন দেখুন</a>
    <a href="routine-exam.pdf" download class="download-link">⬇️ ডাউনলোড করুন</a>
</div>

<button onclick="toggleDropdown('classRoutine')" class="btn">📚 ক্লাস রুটিন</button>
<div id="classRoutine" class="dropdown-content">
    <div class="day-block">
        <a href="routine-saturday.pdf" target="_blank">শনিবার দেখুন</a>
        <a href="routine-saturday.pdf" download class="download-link">⬇️ ডাউনলোড করুন</a>
    </div>

    <div class="day-block">
        <a href="routine-sunday.pdf" target="_blank">রবিবার দেখুন</a>
        <a href="routine-sunday.pdf" download class="download-link">⬇️ ডাউনলোড করুন</a>
    </div>

    <div class="day-block">
        <a href="routine-monday.pdf" target="_blank">সোমবার দেখুন</a>
        <a href="routine-monday.pdf" download class="download-link">⬇️ ডাউনলোড করুন</a>
    </div>

    <div class="day-block">
        <a href="routine-tuesday.pdf" target="_blank">মঙ্গলবার দেখুন</a>
        <a href="routine-tuesday.pdf" download class="download-link">⬇️ ডাউনলোড করুন</a>
    </div>

    <div class="day-block">
        <a href="routine-wednesday.pdf" target="_blank">বুধবার দেখুন</a>
        <a href="routine-wednesday.pdf" download class="download-link">⬇️ ডাউনলোড করুন</a>
    </div>

    <div class="day-block">
        <a href="routine-thursday.pdf" target="_blank">বৃহস্পতিবার দেখুন</a>
        <a href="routine-thursday.pdf" download class="download-link">⬇️ ডাউনলোড করুন</a>
    </div>
</div>

<a href="index.html" class="btn back">← হোমে ফেরত</a>

<script>
function toggleDropdown(id) {
  document.getElementById(id).classList.toggle("show");
}

window.onclick = function(event) {
  if (!event.target.matches('.btn') &&!event.target.closest('.dropdown-content')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    for (var i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}
</script>

</body>
</html>
